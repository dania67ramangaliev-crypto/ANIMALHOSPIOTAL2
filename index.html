<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>COBALT TERMINAL</title>

<!-- Шрифт Arimo -->
<link href="https://fonts.googleapis.com/css2?family=Arimo&display=swap" rel="stylesheet">

<style>
body{
background:#000;
color:#fff;
font-family:'Arimo', Arial, sans-serif;
text-align:center;
margin-top:15%;
}

h1{
letter-spacing:4px;
font-weight:normal;
}

input,button,textarea{
background:#000;
color:#fff;
border:1px solid #fff;
padding:10px;
font-family:'Arimo', Arial, sans-serif;
}

button{
cursor:pointer;
}

button:hover{
background:#fff;
color:#000;
}

textarea{
width:80%;
height:60px;
resize:none;
margin-top:10px;
}

#content{
display:none;
margin-top:20px;
}
</style>
</head>
<body>

<h1>COBALT ACCESS</h1>

<p>ENTER PASSWORD</p>
<input type="password" id="pass">
<br><br>
<button onclick="check()">ENTER</button>

<p id="msg"></p>

<div id="content">
<h2>ACCESS GRANTED</h2>

<textarea readonly onclick="this.select()">
loadstring(game:HttpGet("https://github.com/notpoiu/cobalt/releases/latest/download/Cobalt.luau"))()
</textarea>

</div>

<script>
function check(){
if(document.getElementById("pass").value=="0492"){
document.getElementById("content").style.display="block";
document.getElementById("msg").innerHTML="";
}else{
document.getElementById("msg").innerHTML="ACCESS DENIED";
}
}
</script>

</body>
</html>
