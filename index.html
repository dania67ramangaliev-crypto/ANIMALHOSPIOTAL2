<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ROBLOX TERMINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Arimo&display=swap" rel="stylesheet">

<style>
body{
background:#000;
color:#fff;
font-family:Arial, Arimo, sans-serif;
margin:0;
padding:0;
}

.wrapper{
width:400px;
margin:120px auto;
border:2px solid #fff;
padding:20px;
background:#000;
}

h1{
font-size:18px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
border-bottom:1px solid #fff;
padding-bottom:10px;
}

label{
font-size:12px;
}

input{
width:100%;
padding:6px;
margin-top:5px;
background:#000;
color:#fff;
border:1px solid #fff;
font-size:12px;
}

button{
width:100%;
margin-top:10px;
padding:6px;
background:#fff;
color:#000;
border:1px solid #fff;
font-size:12px;
cursor:pointer;
}

button:active{
background:#000;
color:#fff;
}

#error{
margin-top:10px;
font-size:12px;
color:#fff;
text-align:center;
}

#content{
display:none;
margin-top:15px;
border-top:1px solid #fff;
padding-top:10px;
}

textarea{
width:100%;
height:60px;
background:#000;
color:#fff;
border:1px solid #fff;
font-size:11px;
resize:none;
padding:5px;
}
</style>
</head>
<body>

<div class="wrapper">

<h1>ROBLOX ACCESS PANEL</h1>

<label>Password:</label>
<input type="password" id="pass">

<button onclick="check()">Login</button>

<div id="error"></div>

<div id="content">
<p style="font-size:12px;">Access Granted.</p>

<textarea readonly onclick="this.select()">
loadstring(game:HttpGet("https://github.com/notpoiu/cobalt/releases/latest/download/Cobalt.luau"))()
</textarea>

</div>

</div>

<script>
function check(){
if(document.getElementById("pass").value=="0492"){
document.getElementById("content").style.display="block";
document.getElementById("error").innerHTML="";
}else{
document.getElementById("error").innerHTML="Invalid Password";
}
}
</script>

</body>
</html>
